<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home - Smarg</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Sofia+Sans:ital,wght@0,1..1000;1,1..1000&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Header section  -->
    <section class="header">
      <div class="logo">
        <img src="assets/img/logo.png" />
      </div>
      <nav>
        <a href="#">How it Works</a>
        <a href="#">About Us</a>
        <a href="#">Testimonials</a>
      </nav>
      <div class="nav-btn">
        <a href="#">Sign In</a>
        <button class="nav-sec">Get Started</button>
      </div>
    </section>

    <!-- Hero Section  -->
    <section class="hero">
      <h4>Helping digital products</h4>

      <h1>
        The workplace for<br />
        remote
        <span class="highlight">
          contracts
          <img src="assets/img/contract-vector.png" class="underline" />
        </span>
        gigs.
      </h1>
      <p>
        Smarg is a remote contract facilitator that aims to secure, manage<br />
        and ensure quality delivery for freelancers
      </p>
      <div class="hero-btn">
        <input type="email" placeholder="Enter Email Address" />
        <button>Get Started</button>
      </div>
      <div class="bubble bubble1"></div>
      <div class="bubble bubble2"></div>
      <div class="bubble bubble3"></div>
    </section>
  </body>
</html>
