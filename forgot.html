<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - Smarg</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Sofia+Sans:ital,wght@0,1..1000;1,1..1000&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/jpeg/png" href="/assets/img/favicon.jpeg" />
  </head>
  <body>
    <!-- Header section  -->
    <section class="header">
      <div class="logo">
        <a href="index.html"><img src="assets/img/logo.png" /></a>
      </div>
      <div class="hamburger" id="hamburger">☰</div>

      <div class="mobile-menu" id="mobileMenu">
        <nav>
          <a href="index.html">Home</a>
          <a href="privacy-policy.html">Privacy Policy</a>
          <a href="#">Terms of Service</a>
        </nav>
      </div>
    </section>

    <section class="auth-container">
      <div class="form-box">
        <h1>Forgot Password</h1>
        <p>Enter your email address to reset your password</p>
        <input type="email" placeholder="Email Address" />

        <p class="terms">
          <a href="signin.html" class="forgo">Back to Signin</a>
        </p>

        <div class="buttons">
          <button
            class="signup-btn"
            onclick="window.location.href = 'confirmation.html'"
          >
            Reset Password
          </button>
        </div>

        <div class="already mobile-only">
          <p class="signin">
            Already a member? <a href="signin.html">Sign up</a>
          </p>
        </div>
      </div>
    </section>
    <script src="assets/js/script.js" defer></script>
  </body>
</html>
