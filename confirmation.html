<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confirmation Email Sent - Smarg</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Sofia+Sans:ital,wght@0,1..1000;1,1..1000&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/jpeg/png" href="/assets/img/favicon.jpeg" />
  </head>
  <body>
    <!-- Header section  -->
    <section class="header">
      <div class="logo">
        <a href="index.html"><img src="assets/img/logo.png" /></a>
      </div>
      <div class="hamburger" id="hamburger">☰</div>

      <div class="mobile-menu" id="mobileMenu">
        <nav>
          <a href="index.html">Home</a>
          <a href="privacy-policy.html">Privacy Policy</a>
          <a href="#">Terms of Service</a>
        </nav>
      </div>
    </section>

    <section class="auth-container">
      <div class="form-box">
        <img
          src="assets/img/confirmation-email-img.png"
          alt="confirmation email image"
        />
        <h1>Confirmation Email Sent</h1>
        <p>
          We sent a confirmation link to your email address. Kindly click the
          link to confirm
        </p>

        <div class="buttons">
          <button class="signup-btn">Open Email App</button>
        </div>

        <div class="forgo-links">
          <a href="forgot.html"><span class="for">Wrong Email?</span></a>
          <a href="#">Didn’t get the link? <span>Resend Code</span></a>
        </div>
      </div>
    </section>
    <script src="./assets/js/script.js" defer></script>
  </body>
</html>
